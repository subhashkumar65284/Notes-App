<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a939b"/>
      <stop offset="100%" stop-color="#676e75"/>
    </linearGradient>

    <linearGradient id="tealLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a896"/>
      <stop offset="100%" stop-color="#4fdcc6"/>
    </linearGradient>

    <linearGradient id="tealMedium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#029385"/>
      <stop offset="100%" stop-color="#006d62"/>
    </linearGradient>

    <linearGradient id="tealBright" x1="0%" y1="100%" x2="100%" y2="0%">
